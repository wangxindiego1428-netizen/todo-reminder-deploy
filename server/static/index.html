<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今日待办</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <header class="head">
      <div class="topbar">
        <h1 id="heading">今日待办</h1>
        <a class="ov-link" href="/overview">总览</a>
      </div>
      <div class="nav">
        <button class="nav-arrow" id="prev" type="button" aria-label="前一天">‹</button>
        <button class="nav-date" id="dateBtn" type="button" aria-label="选择日期"></button>
        <button class="nav-arrow" id="next" type="button" aria-label="后一天">›</button>
        <span class="count" id="count"></span>
        <button class="today-reset" id="todayBtn" type="button" hidden>回今天</button>
        <input type="date" id="datePick" class="date-hidden" aria-hidden="true" tabindex="-1">
      </div>
    </header>
    <div class="rule"></div>
    <div class="add">
      <input id="title" type="text" placeholder="添加待办…" autocomplete="off">
      <input id="when" type="datetime-local" title="可选：提醒的年月日与时间">
      <select id="repeat" title="重复周期">
        <option value="none">不重复</option>
        <option value="daily">每日</option>
        <option value="weekly">每周</option>
        <option value="monthly">每月</option>
        <option value="yearly">每年</option>
      </select>
      <button class="addbtn" id="add">添加</button>
    </div>
    <ul id="list"></ul>
    <p class="empty" id="empty" hidden>今天还没有待办</p>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
